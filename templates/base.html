<style>
:root{
    --primary:#0f172a;
    --accent:#ff6b00;
    --light:#f8fafc;
    --text:#1e293b;
}

body{
    font-family:'Poppins', sans-serif;
    background:var(--light);
    margin:0;
    color:var(--text);
}

/* NAVBAR */
.navbar{
    background: transparent;
    position:absolute;
    width:100%;
    z-index:1000;
    transition: all 0.3s ease;
}

/* MOBILE MENU BACKGROUND */
@media (max-width: 991px) {
  .navbar-collapse {
    background: #0f172a;
    padding: 20px;
    border-radius: 12px;
    margin-top: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  .navbar .nav-link {
    display: block;
    padding: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .navbar .nav-link:last-child {
    border-bottom: none;
  }
}
.navbar .nav-link{
    color:white !important;
    font-weight:500;
}
.navbar .nav-link:hover{
    color:var(--accent) !important;
}

/* HERO GLOBAL */
.hero{
    min-height:100vh;
    display:flex;
    align-items:center;
    position:relative;
}

/* TRACK CARD */
.track-box{
    margin-top:30px;
}

.track-form{
    background:white;
    padding:10px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.track-form input{
    border:none;
    outline:none;
    flex:1;
    padding:12px;
}

.track-form button{
    background:var(--accent);
    border:none;
    color:white;
    padding:12px 20px;
    border-radius:8px;
}

/* CARD UI */
.card{
    border:none;
    border-radius:14px;
}

/* SECTIONS */
section{
    padding:80px 0;
}

/* SERVICES */
.services h5{
    font-weight:600;
}

.services .col-md-4{
    background:white;
    border-radius:12px;
    padding:25px;
    margin:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.05);
    transition:0.3s;
}
.services .col-md-4:hover{
    transform:translateY(-5px);
}

/* MAP */
#map{
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

/* CTA */
.cta{
    background:#0f172a;
    color:white;
    text-align:center;
    padding:60px 20px;
}

.track-result {
    border-left:5px solid var(--accent);
}


/* FOOTER */
.footer{
    background:#020617;
    color:#ccc;
    padding:40px;
}

/* New Services */
.scroll-services {
  background:#fff;
}

.scroll-wrapper {
  display:flex;
  max-width:1200px;
  margin:auto;
}

.scroll-left {
  position:sticky;
  top:100px;
  flex:1;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
}

.scroll-right {
  flex:1;
}



.service-card {
  background:#fff;
  margin-bottom:40px;
  padding:20px;
  border-radius:14px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
  transition:0.3s;
}

.service-card img {
  width:100%;
  border-radius:10px;
  margin-bottom:15px;
}

.service-card:hover {
  transform:translateY(-5px);
}

/* MOBILE FIX */
@media (max-width: 768px) {

  .scroll-wrapper {
    flex-direction: column;
  }

  .scroll-left {
    position: relative;   /* remove sticky */
    height: auto;
    top: unset;
    margin-bottom: 20px;
    text-align: center;
  }

  .scroll-right {
    width: 100%;
  }

  .service-card {
    margin-bottom: 20px;
  }
}


/*For close tracking information button*/
.close-btn {
    position:absolute;
    top:10px;
    right:15px;
    background:none;
    border:none;
    font-size:22px;
    font-weight:bold;
    color:#999;
    cursor:pointer;
    transition:0.2s;
}

.close-btn:hover {
    color:#ff6b00;
    transform:scale(1.2);
}

/*Spinner*/
#trackBtn {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
}

/*Statistics Animation*/
.stats-section {
  background:#f8fafc;
}

.stat-card {
  background:white;
  padding:30px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
  transition:0.3s;
}

.stat-card i {
  font-size:30px;
  color:#0f172a;
  margin-bottom:10px;
}

.stat-card h3 {
  font-size:28px;
  font-weight:700;
}

.stat-card p {
  color:#555;
}

.stat-card:hover {
  transform:translateY(-5px);
}

/* MOBILE: show one card per slide */
@media(max-width:768px){
  .carousel-item .row {
    flex-direction:column;
    align-items:center;
  }
}


/* STAT Marquee */
.stats-marquee {
  background:#0f172a;
  padding:30px 0;
  overflow:hidden;
}

.marquee {
  display:flex;
  overflow:hidden;
  position:relative;
}

.marquee-content {
  display:flex;
  gap:40px;
  animation: scroll 20s linear infinite;
}

.stat-item {
  min-width:200px;
  text-align:center;
  color:white;
}

.stat-item i {
  font-size:26px;
  margin-bottom:8px;
}

.stat-item h5 {
  font-weight:700;
}

.stat-item p {
  font-size:13px;
  color:#ccc;
}

/* INFINITE SCROLL */
@keyframes scroll {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(-50%);
  }
}

/* PAUSE ON HOVER */
.marquee:hover .marquee-content {
  animation-play-state: paused;
}

/* Blur fade edges*/
.marquee::before,
.marquee::after {
  content:"";
  position:absolute;
  top:0;
  width:80px;
  height:100%;
  z-index:2;
}

.marquee::before {
  left:0;
  background:linear-gradient(to right, #0f172a, transparent);
}

.marquee::after {
  right:0;
  background:linear-gradient(to left, #0f172a, transparent);
}

/* Infinite Stats Scroll */
.stats-scroll-wrapper {
  overflow: hidden;
  position: relative;
}

.stats-scroll {
  display: flex;
  gap: 30px;
  animation: statsScroll 25s linear infinite;
}

.stats-scroll .stat-card {
  min-width: 220px;
  flex-shrink: 0;
}

/* Animation */
@keyframes statsScroll {
  0% {
    transform: translateX(0);
  }
  100% {
    transform: translateX(-50%);
  }
}

/* Pause on hover */
.stats-scroll-wrapper:hover .stats-scroll {
  animation-play-state: paused;
}

/* Gradient fade edges */
.stats-scroll-wrapper {
  overflow: hidden;
  position: relative;
}

/* LEFT FADE */
.stats-scroll-wrapper::before {
  content: "";
  position: absolute;
  left: 0;
  top: 0;
  width: 100px;
  height: 100%;
  z-index: 2;
  background: linear-gradient(to right, #f8fafc, transparent);
}

/* RIGHT FADE */
.stats-scroll-wrapper::after {
  content: "";
  position: absolute;
  right: 0;
  top: 0;
  width: 100px;
  height: 100%;
  z-index: 2;
  background: linear-gradient(to left, #f8fafc, transparent);
}

.stats-scroll {
  display: flex;
  gap: 30px;
  animation: statsScroll 30s linear infinite; /* slower = smoother */
}

.stat-card:hover {
  transform: scale(1.05);
}

/* CUSTOM HAMBURGER ICON */
.menu-icon {
  width: 25px;
  height: 2px;
  background: white;
  display: block;
  position: relative;
  transition: all 0.3s ease;
}

.menu-icon::before,
.menu-icon::after {
  content: "";
  width: 25px;
  height: 2px;
  background: white;
  position: absolute;
  left: 0;
  transition: all 0.3s ease;
}

.menu-icon::before {
  top: -8px;
}

.menu-icon::after {
  top: 8px;
}

/* ACTIVE (X STATE) */
.navbar-toggler.active .menu-icon {
  background: transparent;
}

.navbar-toggler.active .menu-icon::before {
  transform: rotate(45deg);
  top: 0;
}

.navbar-toggler.active .menu-icon::after {
  transform: rotate(-45deg);
  top: 0;
}

.navbar.scrolled {
  background: rgba(15, 23, 42, 0.95);
  backdrop-filter: blur(8px);
}

</style>

</head>

<nav class="navbar navbar-expand-lg navbar-dark py-3">

        <li class="nav-item"><a class="nav-link" href="#faq">FAQ</a></li>
        <li class="nav-item"><a class="nav-link" href="#support">Support</a></li>

<!-- PAGE CONTENT -->
<div>
{% block content %}{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const toggler = document.querySelector('.navbar-toggler');

toggler.addEventListener('click', function () {
  this.classList.toggle('active');
});
</script>

<script>
window.addEventListener("scroll", function () {
  const navbar = document.querySelector(".navbar");
  navbar.classList.toggle("scrolled", window.scrollY > 50);
});
</script>
 
</body>
