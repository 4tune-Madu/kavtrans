{% extends "dashboard/dashboard_base.html" %}
{% block content %}
<div class="container" style="max-width:700px; margin:50px auto;">
    <h3 class="fw-bold text-center">{{ cause.title }}</h3>
    <p class="text-center mb-4">Amount: <strong>${{ amount }}</strong></p>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="mb-4">
            <label class="fw-semibold">Select Payment Method:</label>
            <div class="form-check">
                <input type="radio" name="payment_type" value="bank" id="bank" class="form-check-input">
                <label class="form-check-label" for="bank">💳 Bank Transfer</label>
            </div>
            <div class="form-check">
                <input type="radio" name="payment_type" value="crypto" id="crypto" class="form-check-input">
                <label class="form-check-label" for="crypto">₿ Crypto</label>
            </div>
            <div class="form-check">
                <input type="radio" name="payment_type" value="paypal" id="paypal" class="form-check-input">
                <label class="form-check-label" for="paypal">🅿️ PayPal</label>
            </div>
        </div>

        <button type="submit" class="btn btn-dark w-100 py-2 mt-3">Proceed</button>
    </form>
</div>
{% endblock %}
