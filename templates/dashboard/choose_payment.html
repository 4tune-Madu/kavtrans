{% extends "dashboard/dashboard_base.html" %}
{% block content %}
<div class="container" style="max-width:700px; margin:50px auto;">
    <h3 class="fw-bold text-center">{{ cause.title }}</h3>
    <p class="text-center mb-4">Amount: <strong>${{ amount }}</strong></p>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}

    <!-- Choose Payment Method -->
<form method="POST">
    {% csrf_token %}
    <div class="mb-3">
        <label>Payment Method</label>
        <select name="payment_type" id="paymentType" class="form-control">
            <option value="">-- Select Payment --</option>
            <option value="bank">Bank Transfer</option>
            <option value="crypto">Crypto</option>
            <option value="paypal">PayPal</option>
        </select>
    </div>

    <div id="cryptoCurrencyDiv" style="display:none;">
        <label>Select Crypto</label>
        <select name="crypto_currency" class="form-control">
            <option value="BTC">Bitcoin</option>
            <option value="ETH">Ethereum</option>
            <option value="USDT">USDT</option>
            <option value="TRON">TRON</option>
        </select>
    </div>

    <button class="btn btn-dark mt-3 w-100">Continue</button>
</form>

<script>
const paymentSelect = document.getElementById("paymentType");
const cryptoDiv = document.getElementById("cryptoCurrencyDiv");

paymentSelect.addEventListener("change", function() {
    cryptoDiv.style.display = (this.value === "crypto") ? "block" : "none";
});
</script>
</div>
{% endblock %}
