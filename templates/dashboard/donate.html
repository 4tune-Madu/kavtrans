{% extends "base.html" %}
{% load static %}

{% block content %}

<div class="container" style="max-width:900px; margin:60px auto;">

    <!-- CAUSE HEADER -->
    <div class="card p-4 shadow-sm mb-4 text-center">
        <h2 class="fw-bold">{{ cause.title }}</h2>
        <p class="text-muted">{{ cause.description }}</p>

        <div class="mt-3">
            <strong>${{ cause.amount_raised }}</strong> raised of 
            <strong>${{ cause.target_amount }}</strong>
        </div>

        <div class="progress mt-2" style="height:20px;">
            <div class="progress-bar"
                 style="width: {{ cause.progress_percentage }}%; background:#162e4d;">
                {{ cause.progress_percentage }}%
            </div>
        </div>
    </div>

    <!-- DONATION FORM -->
    <div class="card p-4 shadow-sm">

        <h4 class="mb-4 text-center">Make a Donation</h4>

        <form method="POST">
            {% csrf_token %}

            <!-- ERROR MESSAGE -->
            {% if error %}
                <div class="alert alert-danger text-center">
                    {{ error }}
                </div>
            {% endif %}

            <!-- AMOUNT INPUT -->
            <div class="mb-4">
                <label class="form-label fw-semibold">Enter Amount ($)</label>
                <input type="number"
                       name="amount"
                       class="form-control form-control-lg"
                       placeholder="e.g. 50"
                       required>
            </div>

            <!-- SUBMIT BUTTON -->
            <button class="btn btn-dark w-100 py-2">
                Continue to Payment →
            </button>

        </form>

    </div>

</div>

<!-- STYLING -->
<style>

.card {
    border-radius: 14px;
}

.progress {
    border-radius: 10px;
    overflow: hidden;
}

.btn-dark {
    background: #162e4d;
    border: none;
    transition: 0.3s;
}

.btn-dark:hover {
    background: #0f223b;
}

</style>

{% endblock %}
