{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <h2>Edit Endorsement</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button class="btn btn-success">
            Update Endorsement
        </button>

        <a href="{% url 'manage_endorsements' %}" class="btn btn-secondary">
            Cancel
        </a>
    </form>

</div>

{% endblock %}
