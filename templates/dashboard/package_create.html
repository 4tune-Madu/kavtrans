{% extends "dashboard/dashboard_base.html" %}
{% load static %}

{% block content %}

<style>

/* Page layout */
.package-wrapper{
    max-width:900px;
    margin:60px auto;
}

/* Card */
.package-card{
    background:#fff;
    padding:40px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

/* Title */
.package-title{
    color:#162e4d;
    font-weight:600;
    margin-bottom:30px;
}

/* Form inputs */
.package-form input,
.package-form textarea{
    width:100%;
    padding:14px 18px;
    border-radius:10px;
    border:1px solid #ccc;
    font-size:15px;
    margin-bottom:18px;
    transition:0.3s;
}

/* Input focus */
.package-form input:focus,
.package-form textarea:focus{
    outline:none;
    border-color:#162e4d;
    box-shadow:0 4px 12px rgba(22,46,77,0.25);
}

/* Textarea */
.package-form textarea{
    min-height:120px;
    resize:none;
}

/* Button */
.create-btn{
    background:#162e4d;
    color:#fff;
    border:none;
    padding:14px 28px;
    border-radius:10px;
    font-weight:600;
    transition:0.3s;
}

.create-btn:hover{
    background:#0f223b;
    transform:translateY(-2px);
}

/* Back link */
.back-link{
    display:inline-block;
    margin-top:20px;
    text-decoration:none;
    color:#162e4d;
    font-weight:500;
}

</style>

<div class="container package-wrapper">

<div class="package-card animate__animated animate__fadeIn">

<h3 class="package-title">Create Package</h3>

<form method="POST" class="package-form">

{% csrf_token %}

<div class="row">

<div class="col-md-6">
<input type="text" name="sender_name" placeholder="Sender Name" required>
</div>

<div class="col-md-6">
<input type="text" name="receiver_name" placeholder="Receiver Name" required>
</div>

<div class="col-md-6">
<input type="text" name="receiver_phone" placeholder="Receiver Phone" required>
</div>

<div class="col-md-6">
<input type="number" step="0.01" name="weight" placeholder="Weight (kg)" required>
</div>

<div class="col-md-12">
<input type="text" name="receiver_address" placeholder="Receiver Address" required>
</div>

<div class="col-md-12">
<textarea name="description" placeholder="Package Description"></textarea>
</div>

</div>

<button type="submit" class="create-btn">Create Package</button>

</form>

<a href="{% url 'dashboard_home' %}" class="back-link">
← Back to Dashboard
</a>

</div>

</div>

{% endblock %}
