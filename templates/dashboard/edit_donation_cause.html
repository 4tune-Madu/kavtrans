{% extends "dashboard/dashboard_base.html" %}

{% block content %}
<div class="container" style="max-width:600px; margin:50px auto;">
    <h3>Edit Donation Cause</h3>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label>Title</label>
            <input type="text" name="title" class="form-control" value="{{ cause.title }}" required>
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="4" required>{{ cause.description }}</textarea>
        </div>

        <div class="mb-3">
            <label>Target Amount ($)</label>
            <input type="number" step="0.01" name="target_amount" class="form-control" value="{{ cause.target_amount }}" required>
        </div>

        <div class="mb-3">
            <label>Amount Raised ($)</label>
            <input type="number" step="0.01" name="amount_raised" class="form-control" value="{{ cause.amount_raised }}">
        </div>

        <div class="mb-3">
            <label>Current Image</label><br>
            {% if cause.image %}
                <img src="{{ cause.image.url }}" style="width:150px; border-radius:8px; margin-bottom:10px;">
            {% else %}
                <p>No image uploaded</p>
            {% endif %}
        </div>

        <div class="mb-3">
            <label>Change Image</label>
            <input type="file" name="image" class="form-control">
        </div>

        <button type="submit" class="btn btn-success">Update Cause</button>
        <a href="{% url 'donation_causes' %}" class="btn btn-secondary">Back</a>
    </form>
</div>
{% endblock %}
