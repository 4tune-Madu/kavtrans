{% extends "dashboard/dashboard_base.html" %}

{% block content %}
<div class="container" style="max-width:600px; margin:50px auto;">
    <h3>Add Donation Cause</h3>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-3">
            <label>Title</label>
            <input type="text" name="title" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Description</label>
            <textarea name="description" class="form-control" rows="4" required></textarea>
        </div>

        <div class="mb-3">
            <label>Target Amount ($)</label>
            <input type="number" step="0.01" name="target_amount" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Amount Raised ($)</label>
            <input type="number" step="0.01" name="amount_raised" class="form-control" value="0">
        </div>

        <div class="mb-3">
            <label>Image</label>
            <input type="file" name="image" class="form-control">
        </div>

        <button type="submit" class="btn btn-success">Add Cause</button>
        <a href="{% url 'donation_causes' %}" class="btn btn-secondary">Back</a>
    </form>
</div>
{% endblock %}
