{% extends "dashboard/dashboard_base.html" %}

{% block content %}

<div class="container mt-5">

<h4>Donor Details</h4>

<div class="card p-4">

<p><strong>Name:</strong> {{ donor.donor_name|default:"Anonymous" }}</p>
<p><strong>Email:</strong> {{ donor.donor_email }}</p>
<p><strong>Message:</strong> {{ donor.note }}</p>
<p><strong>Date:</strong> {{ donor.created_at }}</p>

{% if donor.donor_image %}
    <img src="{{ donor.donor_image.url }}" width="200" class="mt-3">
{% endif %}

</div>

</div>

{% endblock %}
