{% extends "dashboard/dashboard_base.html" %}
{% block content %}

<div class="container mt-5" style="max-width:700px;">

    <div class="card p-4 shadow-sm">
        <h4 class="mb-4">Edit Payment Account</h4>

        <form method="POST">
            {% csrf_token %}

            <!-- ACCOUNT TYPE -->
            <div class="mb-3">
                <label class="form-label">Account Type</label>
                <select name="account_type" id="accountType" class="form-control">
                    <option value="">-- Select Type --</option>
                    <option value="bank" {% if account.account_type == "bank" %}selected{% endif %}>Bank Transfer</option>
                    <option value="crypto" {% if account.account_type == "crypto" %}selected{% endif %}>Crypto</option>
                    <option value="paypal" {% if account.account_type == "paypal" %}selected{% endif %}>PayPal</option>
                </select>
            </div>

            <!-- BANK -->
            <div id="bankFields" style="display:none;">
                <input type="text" name="account_name" class="form-control mb-2" 
                       placeholder="Account Name" value="{{ account.account_name }}">
                <input type="text" name="account_number" class="form-control mb-2" 
                       placeholder="Account Number" value="{{ account.account_number }}">
                <input type="text" name="bank_name" class="form-control mb-2" 
                       placeholder="Bank Name" value="{{ account.bank_name }}">
                <input type="text" name="swift_code" class="form-control mb-2" 
                       placeholder="SWIFT Code" value="{{ account.swift_code }}">
                <input type="text" name="branch" class="form-control mb-2" 
                       placeholder="Branch" value="{{ account.branch }}">
            </div>

            <!-- CRYPTO -->
            <div id="cryptoFields" style="display:none;">
                <select name="currency" class="form-control mb-2">
                    <option value="BTC" {% if account.currency == "BTC" %}selected{% endif %}>Bitcoin</option>
                    <option value="ETH" {% if account.currency == "ETH" %}selected{% endif %}>Ethereum</option>
                    <option value="USDT" {% if account.currency == "USDT" %}selected{% endif %}>USDT</option>
                    <option value="TRON" {% if account.currency == "TRON" %}selected{% endif %}>TRON</option>
                </select>
                <input type="text" name="wallet_address" class="form-control mb-2" 
                       placeholder="Wallet Address" value="{{ account.wallet_address }}">
                <input type="text" name="network" class="form-control mb-2" 
                       placeholder="Network (optional)" value="{{ account.network }}">
            </div>

            <!-- PAYPAL -->
            <div id="paypalFields" style="display:none;">
                <input type="email" name="email" class="form-control mb-2" 
                       placeholder="PayPal Email" value="{{ account.email }}">
            </div>

            <div class="form-check mb-3">
                <input type="checkbox" name="is_active" class="form-check-input"
                       {% if account.is_active %}checked{% endif %}>
                <label class="form-check-label">Active</label>
            </div>

            <button class="btn btn-dark mt-3 w-100">Update Account</button>

        </form>
    </div>

</div>

<!-- SCRIPT -->
<script>
const typeSelect = document.getElementById("accountType");
const bankFields = document.getElementById("bankFields");
const cryptoFields = document.getElementById("cryptoFields");
const paypalFields = document.getElementById("paypalFields");

function toggleFields(value) {
    bankFields.style.display = "none";
    cryptoFields.style.display = "none";
    paypalFields.style.display = "none";

    if (value === "bank") bankFields.style.display = "block";
    else if (value === "crypto") cryptoFields.style.display = "block";
    else if (value === "paypal") paypalFields.style.display = "block";
}

// Initialize on load
toggleFields(typeSelect.value);

typeSelect.addEventListener("change", function() {
    toggleFields(this.value);
});
</script>

{% endblock %}
