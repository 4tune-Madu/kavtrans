{% extends "dashboard/dashboard_base.html" %}
{% block content %}

<div class="container mt-4">

    <h3>Add Payment Account</h3>

    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
            <label>Account Type</label>
            <select name="account_type" class="form-control">
                <option value="bank">Bank Transfer</option>
                <option value="crypto">Crypto</option>
                <option value="paypal">PayPal</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Account Name</label>
            <input type="text" name="name" class="form-control" placeholder="e.g GTBank - John Doe" required>
        </div>

        <div class="mb-3">
            <label>Details</label>
            <textarea name="details" class="form-control" rows="4"
                placeholder="Account number / wallet address / PayPal email" required></textarea>
        </div>

        <button class="btn btn-dark">Save Account</button>

    </form>

</div>

{% endblock %}
