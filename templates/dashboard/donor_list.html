{% extends "dashboard/dashboard_base.html" %}

{% block content %}

<div class="container mt-5">

<h4>Donors</h4>

<table class="table table-hover">
<thead>
<tr>
<th>Name</th>
<th>Email</th>
<th>Date</th>
<th>Action</th>
</tr>
</thead>

<tbody>
{% for donor in donors %}
<tr>
<td>{{ donor.donor_name|default:"Anonymous" }}</td>
<td>{{ donor.donor_email }}</td>
<td>{{ donor.created_at }}</td>
<td>
<a href="{% url 'donor_detail' donor.id %}" class="btn btn-sm btn-primary">
View
</a>
</td>
</tr>
{% empty %}
<tr><td colspan="4">No donors yet</td></tr>
{% endfor %}
</tbody>

</table>

</div>

{% endblock %}
